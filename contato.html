    <h1>Mande uma mensagem</h1>

    <form>
        <ul>
            <li>
                <label for="nome">Nome</label>
                <input ca type="text" id="nome" name="nome">
            </li>
            <li>
                <label for="email">E-Mail</label>
                <input class="field-full" type="email" id="email" name="email">
            </li>
            <li>
                <label for="telefone">Telefone</label>
                <input class="field-full" type="tel" id="telefone" name="telefone">
                <span class="placeholder-text">(99) 99999-9999</span>
            </li>
            <li>
                <label for="assunto">Assunto</label>
                <select class="select-full" id="assunto" name="assunto">
                    <option value="">-- Selecione --</option>
                </select>
            </li>
            <li>
                <label for="mensagem">Mensagem</label>
                <textarea id="mensagem" name="mensagem" rows="3" cols="25"></textarea>
            </li>
            <li>
                <fieldset>
                    <legend>Opções de Resposta</legend>
                    <label style="width: auto;" for="resp-email">E-Mail</label>
                    <input type="checkbox" id="resp-email" name="opcao_resposta" value="email">

                    <label style="width: auto; margin-left: 10px;" for="resp-telefone">Telefone</label>
                    <input type="checkbox" id="resp-telefone" name="opcao_resposta" value="telefone">
                </fieldset>
            </li>
            <li style="list-style: none;">
                <button class="button-full" type="submit">Enviar</button>
            </li>
        </ul>
    </form>
